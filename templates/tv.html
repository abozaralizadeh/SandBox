  <style>
    .custom-link {

    body {
      background-color: #000000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      margin: 0;
      animation: fadeIn 2s ease-in-out;
      /* Apply fade-in animation */
    }

    #tv {
      background-image: url('static/sandboxtv.webp');
      background-size: cover;
      background-position: center;
      width: 3200px;
      height: 3252px;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    #screen {
      width: 450px;
      height: 331px;
      background-color: rgba(0, 0, 0, 0);
      color: #00ff00;
      font-family: monospace;
      padding: 10px;
      overflow: hidden;
      position: relative;
      margin-top: -12px;
      margin-left: -113px;
      border-radius: 75px;
      overflow-y: scroll;
      box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.7);

      /* Fading edges */
      -webkit-mask-image: radial-gradient(circle, rgba(0, 0, 0, 1) 80%, rgba(0, 0, 0, 0) 100%);
      mask-image: radial-gradient(circle, rgba(0, 0, 0, 1) 80%, rgba(0, 0, 0, 0) 100%);
      -webkit-mask-size: cover;
      mask-size: cover;
      -webkit-mask-composite: destination-in;
      mask-composite: intersect;
    }

    /* Big station title that leads the scroll, centered on the screen and moving
       up together with the decision text (it lives inside #scrollingText). */
    .tv-title {
      display: block;
      text-align: center;
      font-weight: bold;
      font-size: 26px;
      line-height: 1.15;
      margin: 0 0 16px;
      white-space: normal;
      text-shadow: 0 0 6px rgba(0, 255, 0, 0.7);
    }

    /* The text starts transparent on page load and fades in once the video has finished.
       It sits above the no-signal TV static / scanlines. */
    #content {
      position: relative;
      z-index: 2;
      transition: opacity 0.6s ease;
    }

    /* No-signal screen: fill the CRT and center the title + message in the middle of the
       screen (normal channels keep the body text shrink-wrapped/left for readability). */
    #content.no-signal {
      width: 100%;
      text-align: center;
    }

    /* No-signal TV static + scanlines, shown behind the text when a channel has no content. */
    #tvStatic {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 75px;
      display: none;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
      z-index: 0;
    }

    #tvScanlines {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 75px;
      display: none;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
      z-index: 1;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.22) 2px,
        rgba(0, 0, 0, 0.22) 4px
      );
      mix-blend-mode: multiply;
    }

    #scrollingText {
      display: inline-block;
      white-space: pre-line;
      /* Start just below the screen and scroll fully past the top at a constant speed.
         The start/end offsets and duration are set per-text in JS (setupScroll) so a long
         decision doesn't begin far off-screen and arrive late. */
      animation: scroll var(--scroll-dur, 30s) linear infinite;
      will-change: transform;
    }

    /* News-anchor video fills the CRT screen; #screen's mask fades its edges too. */
    #tvVideo {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 75px;
      background: #000;

      /* Fade the video's edges into the screen, matching the scrolling text.
         Wider, softer falloff: stays solid only to ~38% then fades fully out at the border. */
      -webkit-mask-image: radial-gradient(ellipse 78% 78% at center, rgba(0, 0, 0, 1) 38%, rgba(0, 0, 0, 0) 100%);
      mask-image: radial-gradient(ellipse 78% 78% at center, rgba(0, 0, 0, 1) 38%, rgba(0, 0, 0, 0) 100%);
      -webkit-mask-size: cover;
      mask-size: cover;
    }

    #soundHint {
      position: absolute;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      color: #00ff00;
      font-family: monospace;

    #button1 {

<body>

  <a href="/" class="home-button">H⌂me</a>

  <div id="tv">
    <div id="screen">
      <canvas id="tvStatic"></canvas>
      <div id="tvScanlines"></div>
      <p id="content"></p>
      <video id="tvVideo" playsinline preload="auto" style="display:none"></video>
      <audio id="tvAudio" preload="auto"></audio>
      <div id="soundHint" style="display:none">🔊 click for sound</div>
    </div>
    <button id="button1"></button>
    <button id="button2"></button>
    <button id="button3"></button>
    <button id="button4"></button>
  </div>

  <script>
    let currentDate = new Date();

    // ---- text / video mode state ----
    let mode = 'text';            // 'text' | 'video'
    let textRevealed = false;     // hide the scrolling text until the first video has finished
    let videoAvailable = false;   // a ready video exists for currentDate
    let userInteracted = false;   // gate unmuted autoplay behind a user gesture
    let paused = false;           // button3: pause BOTH video and scrolling text
    let currentVideoUrl = '';
    let audioAvailable = false;   // a ready TTS narration exists for currentDate
    let currentAudioUrl = '';
    let statusPollTimer = null;
    const NARRATION_RATE = 1.3;   // play the narration faster (pitch preserved); also speeds
                                  // up already-cached audio with no regeneration needed
    const videoEl = document.getElementById('tvVideo');
    const audioEl = document.getElementById('tvAudio');
    const contentEl = document.getElementById('content');

    // ---- no-signal TV static (shown behind the text when a channel has no content) ----
    const staticCanvas = document.getElementById('tvStatic');
    const scanlinesEl = document.getElementById('tvScanlines');
    const _noiseOff = document.createElement('canvas');
    _noiseOff.width = 160; _noiseOff.height = 120;
    const _noiseCtx = _noiseOff.getContext('2d');
    let staticAnim = null;

    function startTvStatic() {
      if (staticAnim) return;                       // already running
      const screen = document.getElementById('screen');
      staticCanvas.width = screen.clientWidth;
      staticCanvas.height = screen.clientHeight;
      const ctx = staticCanvas.getContext('2d');
      staticCanvas.style.display = 'block';
      scanlinesEl.style.display = 'block';
      requestAnimationFrame(() => {
        staticCanvas.style.opacity = '1';
        scanlinesEl.style.opacity = '1';
      });
      function draw() {
        const id = _noiseCtx.createImageData(_noiseOff.width, _noiseOff.height), d = id.data;
        for (let i = 0; i < d.length; i += 4) {
          const v = Math.random() * 200;            // grayscale noise
          d[i] = d[i + 1] = d[i + 2] = v; d[i + 3] = 255;
        }
        _noiseCtx.putImageData(id, 0, 0);
        ctx.imageSmoothingEnabled = false;          // blocky, TV-like upscale
        ctx.drawImage(_noiseOff, 0, 0, staticCanvas.width, staticCanvas.height);
        staticAnim = requestAnimationFrame(draw);
      }
      draw();
    }

    function stopTvStatic() {
      if (staticAnim) { cancelAnimationFrame(staticAnim); staticAnim = null; }
      staticCanvas.style.opacity = '0';
      scanlinesEl.style.opacity = '0';
      staticCanvas.style.display = 'none';
      scanlinesEl.style.display = 'none';
      const ctx = staticCanvas.getContext('2d');
      if (ctx) ctx.clearRect(0, 0, staticCanvas.width, staticCanvas.height);
    }

    function getContent(date = null) {
      const url = date ? `/get-string?date=${date.toISOString()}` : '/get-string';
      return fetch(url)
        .then(response => {
          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }
          return response.text();
        })
        .catch(error => {
          console.error('Error fetching the string:', error);
          return 'Error fetching content';
        });
    }

    function fetchServerText(date = null) {
      return new Promise((resolve) => {
        setTimeout(() => {
          getContent(date).then(commandLineText => resolve(commandLineText));
        }, 1000);
      });
    }

    function sameDay(a, b) {
      return a && b &&
        a.getFullYear() === b.getFullYear() &&
        a.getMonth() === b.getMonth() &&
        a.getDate() === b.getDate();
    }

    function updateSoundHint() {
      const hint = document.getElementById('soundHint');
      if (!hint) return;
      // Once the user has clicked anywhere, sound is unlocked for the page -> never nag again.
      if (userInteracted) { hint.style.display = 'none'; return; }
      const videoNeedsClick = (mode === 'video' && videoEl.muted && !videoEl.paused);
      const audioNeedsClick = (mode === 'text' && textRevealed && audioAvailable && !paused && audioEl.paused);
      hint.style.display = (videoNeedsClick || audioNeedsClick) ? 'block' : 'none';
    }

    function showText() {
      mode = 'text';
      try { videoEl.pause(); } catch (e) {}
      videoEl.style.display = 'none';
      contentEl.style.display = 'block';
      contentEl.style.opacity = textRevealed ? '1' : '0';   // stay invisible until the video finishes
      const st = document.getElementById('scrollingText');
      if (st) st.style.animationPlayState = paused ? 'paused' : 'running';
      // Reset the scroll to the title-centered top exactly once, so the text fades in at the
      // top instead of at a stale position (which looked like a flicker/jump). With narration,
      // startTextAudio sizes + restarts the scroll to the audio; without it, we do it here.
      if (st && textRevealed && !audioAvailable) setupScroll(st);
      startTextAudio();              // play the TTS narration (synced), if available + revealed
      updateSoundHint();
    }

    // Reveal the scrolling text. The actual scroll reset / narration start is handled by the
    // showText() call that always follows, so there is a single, jump-free start.
    function revealText() {
      textRevealed = true;
      contentEl.style.opacity = '1';
    }

    // Size the scroll to the actual text: start just below the screen, end fully above it.
    // Duration follows the narration when available (forcedDur), else a constant pixel speed,
    // so long texts don't begin far off-screen and arrive late, and text+audio stay in sync.
    const SCROLL_SPEED_PX_PER_SEC = 45;
    function setupScroll(el, forcedDur) {
      const screen = document.getElementById('screen');
      const screenH = (screen ? screen.clientHeight : 331);
      const textH = el.scrollHeight || screenH;
      // Start with the station title centered in the screen (visible from second 0), then
      // scroll the whole block up so the decision text follows immediately behind it.
      const title = el.querySelector('.tv-title');
      const startOffset = title
        ? Math.max(0, (screenH - title.offsetHeight) / 2)
        : screenH;                                              // no title -> start just below the screen
      const dur = (forcedDur && isFinite(forcedDur) && forcedDur > 1)
        ? forcedDur
        : Math.max(18, (startOffset + textH) / SCROLL_SPEED_PX_PER_SEC);
      el.style.setProperty('--scroll-start', startOffset + 'px'); // title centered at the top of the scroll
      el.style.setProperty('--scroll-end', (-textH) + 'px');    // end fully above the screen
      el.style.setProperty('--scroll-dur', dur + 's');
      // Restart the animation cleanly so the new offsets/duration apply from the top.
      el.style.animation = 'none';
      void el.offsetHeight;            // force reflow
      el.style.animation = '';         // fall back to the stylesheet rule (with the vars)
      el.style.animationPlayState = paused ? 'paused' : 'running';
    }

    // Faster playback without the chipmunk effect (browsers preserve pitch by default).
    function applyNarrationRate() {
      try {
        audioEl.preservesPitch = true;
        audioEl.mozPreservesPitch = true;
        audioEl.webkitPreservesPitch = true;
        audioEl.playbackRate = NARRATION_RATE;
      } catch (e) {}
    }

    // The on-screen length of the narration after the playback-rate speed-up.
    function effectiveAudioDuration() {
      const r = audioEl.playbackRate || 1;
      return (audioEl.duration && isFinite(audioEl.duration)) ? (audioEl.duration / r) : null;
    }

    // TTS narration synced to the scroll. Needs a user gesture for sound (like the video);
    // the document click handler restarts it if the browser blocked autoplay.
    function startTextAudio() {
      const st = document.getElementById('scrollingText');
      if (!textRevealed) return;                  // narration waits until the text is revealed (after the video)
      if (!audioAvailable || !currentAudioUrl) return;
      if (audioEl.getAttribute('src') !== currentAudioUrl) audioEl.src = currentAudioUrl;
      audioEl.muted = false;
      applyNarrationRate();
      if (paused) { audioEl.pause(); return; }
      // If the duration isn't known yet (freshly set src), hold the scroll pinned at the top
      // and let the loadedmetadata handler start audio + scroll together exactly once. Pinning
      // (rather than letting it run) avoids a scroll-then-snap-back flicker when metadata lands.
      const eff = effectiveAudioDuration();
      if (!eff) {
        if (st) { setupScroll(st); st.style.animationPlayState = 'paused'; }
        return;
      }
      try { audioEl.currentTime = 0; } catch (e) {}
      if (st) setupScroll(st, eff);             // scroll matches the sped-up narration
      audioEl.play().catch(() => {});           // may be blocked until the first click
    }

    // Play preferring SOUND. Only fall back to muted if the browser actually blocks
    // unmuted autoplay (NotAllowedError = no user gesture yet) — NOT on transient
    // interruptions (AbortError) caused by restarting/switching, which must not mute us.
    function playPreferSound() {
      videoEl.muted = false;
      const p = videoEl.play();
      if (p && typeof p.catch === 'function') {
        p.catch((err) => {
          if (err && err.name === 'NotAllowedError') {
            videoEl.muted = true;            // autoplay-with-sound blocked -> muted + hint
            videoEl.play().catch(() => {});
          }
          updateSoundHint();
        });
      }
      updateSoundHint();
    }

    function showVideo(url) {
      if (!url) return;
      mode = 'video';
      stopTvStatic();                                  // a channel with a video is never "no signal"
      stopTextAudio();                                 // narration belongs to text mode only
      if (videoEl.getAttribute('src') !== url) videoEl.src = url;
      try { videoEl.currentTime = 0; } catch (e) {}   // restart from the top each time
      videoEl.style.display = 'block';
      contentEl.style.display = 'none';
      if (paused) { videoEl.pause(); updateSoundHint(); return; }
      playPreferSound();
    }

    function stopTextAudio() {
      try { audioEl.pause(); } catch (e) {}
    }

    // Resume the narration from where it was paused (button3) WITHOUT restarting it from the
    // top. If it was never started for this channel, fall back to startTextAudio (which sets up).
    function resumeTextAudio() {
      if (!textRevealed || !audioAvailable || !currentAudioUrl) return;
      if (audioEl.getAttribute('src') !== currentAudioUrl) { startTextAudio(); return; }
      audioEl.muted = false;
      applyNarrationRate();
      audioEl.play().catch(() => {});   // continue from the current position, no rewind
    }

    // Apply the current pause state to whichever mode is showing (button3).
    function applyPause() {
      if (mode === 'video') {
        if (paused) videoEl.pause(); else playPreferSound();
      } else {
        const st = document.getElementById('scrollingText');
        if (st) st.style.animationPlayState = paused ? 'paused' : 'running';
        if (paused) stopTextAudio(); else resumeTextAudio();
      }
      updateSoundHint();
    }

    // EVERY click is a user gesture: unlock sound on the currently playing media (works
    // repeatedly, so a blocked/muted auto-start can always be turned on by clicking anywhere).
    document.addEventListener('click', () => {
      userInteracted = true;
      if (mode === 'video' && !paused && videoEl.muted) {
        videoEl.muted = false;
        videoEl.play().catch(() => {});
      } else if (mode === 'text' && !paused && audioAvailable && audioEl.paused) {
        startTextAudio();
      }
      updateSoundHint();
    }, true);
    videoEl.addEventListener('playing', updateSoundHint);
    // If the proxied MP4 can't load, fall back to scrolling text instead of a black screen.
    videoEl.addEventListener('error', () => {
      console.error('TV video failed to load:', videoEl.error);
      videoAvailable = false;
      revealText();                 // no usable video -> don't leave the screen blank
      showText();
    });

    // ---- video <-> text loop ----
    // Video ends -> scrolling text (with narration); the narration (or one full scroll when
    // there is no narration) ends -> back to video. Repeats. No-ops while paused / no video.
    videoEl.addEventListener('ended', () => {
      if (!paused && videoAvailable) { revealText(); showText(); }
    });
    audioEl.addEventListener('ended', () => {
      if (!paused && mode === 'text' && videoAvailable && currentVideoUrl) showVideo(currentVideoUrl);
    });
    // When the narration's length is known, match the scroll to it and restart both together
    // so the text finishes scrolling exactly as the narration finishes.
    audioEl.addEventListener('loadedmetadata', () => {
      const st = document.getElementById('scrollingText');
      applyNarrationRate();
      const eff = effectiveAudioDuration();
      // Only act as the deferred starter (audio paused); don't restart a narration that
      // startTextAudio already began, which would play it twice.
      if (mode === 'text' && !paused && textRevealed && st && eff && audioEl.paused) {
        setupScroll(st, eff);
        try { audioEl.currentTime = 0; } catch (e) {}
        audioEl.play().catch(() => {});
      }
    });
    audioEl.addEventListener('error', () => { audioAvailable = false; updateSoundHint(); });
    // Fallback when there is NO narration: switch back to video after one full text scroll.
    document.addEventListener('animationiteration', (e) => {
      if (e.target && e.target.id === 'scrollingText'
          && mode === 'text' && !paused && videoAvailable && currentVideoUrl && !audioAvailable) {
        showVideo(currentVideoUrl);
      }
    });

    async function fetchVideoStatus(date) {
      try {
        const url = `/genbox-video-status?date=${(date || new Date()).toISOString()}`;
        const r = await fetch(url);
        if (!r.ok) return { status: 'absent', audio_status: 'absent' };
        return await r.json();
      } catch (e) {
        return { status: 'absent', audio_status: 'absent' };
      }
    }

    // Poll the status endpoint; the first poll lazily starts background generation. The
    // narration (audio) is usually ready well before the video, so handle them separately.
    function startStatusPolling(date) {
      clearInterval(statusPollTimer);
      videoAvailable = false; currentVideoUrl = '';
      audioAvailable = false; currentAudioUrl = '';
      stopTextAudio();
      const pollDate = date ? new Date(date) : new Date();
      const terminal = (s) => ['ready', 'disabled', 'absent', 'failed'].includes(s || 'absent');
      const poll = async () => {
        const s = await fetchVideoStatus(pollDate);
        // Narration ready (fast) -> enable it, and start it if we're showing text now.
        if (s.audio_status === 'ready' && s.audio_url && !audioAvailable) {
          audioAvailable = true;
          currentAudioUrl = `/genbox-audio?date=${pollDate.toISOString()}`;
          // Preload now (even while hidden) so the duration is known by reveal time and the
          // scroll syncs to the narration immediately, without a restart/jump.
          if (sameDay(pollDate, currentDate) && audioEl.getAttribute('src') !== currentAudioUrl) {
            audioEl.src = currentAudioUrl;
          }
          if (mode === 'text' && sameDay(pollDate, currentDate)) startTextAudio();
          updateSoundHint();
        }
        // Video ready (slow) -> auto-switch to it (the default mode) for the current day.
        if (s.status === 'ready' && s.video_url && !videoAvailable) {
          videoAvailable = true;
          currentVideoUrl = `/genbox-video?date=${pollDate.toISOString()}`;
          if (sameDay(pollDate, currentDate)) showVideo(currentVideoUrl);
        }
        // No video will play for this day -> reveal the text (and its narration) instead of
        // staying blank. Guarded by !textRevealed so it runs once, not every poll.
        if (terminal(s.status) && s.status !== 'ready' && !videoAvailable && !textRevealed
            && mode === 'text' && sameDay(pollDate, currentDate)) {
          revealText();
          showText();
        }
        if (terminal(s.status) && terminal(s.audio_status)) clearInterval(statusPollTimer);
      };
      poll();
      statusPollTimer = setInterval(poll, 4000);
    }

    async function displayServerText(date = null) {
      // Each day (re)load starts on text, unpaused, with the text hidden until that day's
      // video has played through (video is offered/auto-switched when ready).
      paused = false;
      textRevealed = false;
      // Hide the current text INSTANTLY (no fade) before fetching the next channel, so
      // switching channels never flashes the old, now-unstyled text. The static background
      // is kept until the new channel's state is known (set in the branches below), avoiding
      // a bare left-aligned flash. The fade-in transition is restored right after.
      contentEl.style.transition = 'none';
      contentEl.style.opacity = '0';
      void contentEl.offsetHeight;   // commit the instant hide
      contentEl.style.transition = '';
      showText();
      const contentDiv = document.getElementById('content');
      let scrollingText = document.getElementById('scrollingText');

      if (!scrollingText) {
        // Create #scrollingText only if it doesn't exist
        scrollingText = document.createElement('div');
        scrollingText.id = 'scrollingText';
        contentDiv.appendChild(scrollingText);
      }

      const serverText = await fetchServerText(date);
      const titleHTML = '<div class="tv-title">International<br>Artificial Intelligence<br>Government</div>';
      const discoverLink = '\n<a href="https://abozar-alizadeh.medium.com/giving-the-ai-government-a-face-and-a-voice-building-genboxs-self-producing-newsroom-db7f57b9e1c7" target="_blank" class="custom-link">Discover More!</a>';
      const clean = (serverText || '').trim();
      const noContent = !clean || clean === 'Error fetching content';

      if (noContent) {
        // No signal on this channel -> roll TV static behind a "no content" message and show
        // it immediately (there is nothing to wait for / no video on an empty channel).
        // Keep the date + "Discover More!" at the end, like a normal channel.
        startTvStatic();
        contentEl.classList.add('no-signal');   // center the title + message in the screen
        const readableDate = (date ? new Date(date) : new Date())
          .toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
        scrollingText.innerHTML = titleHTML
          + '\n📡 No content found on this channel.\nKeep turning the dial to change the channel…'
          + '\n\n' + readableDate
          + discoverLink;
        textRevealed = true;
        contentEl.style.opacity = '1';
        setupScroll(scrollingText);
        startStatusPolling(date);
        return;
      }

      // Real content -> clear any leftover no-signal static/centering from the previous channel.
      stopTvStatic();
      contentEl.classList.remove('no-signal');
      scrollingText.innerHTML = titleHTML + serverText + discoverLink; // Only update the text content
      setupScroll(scrollingText);   // size the scroll to this text's length

      startStatusPolling(date);
    }

    const button1 = document.getElementById('button1');
    let rotationAngle1 = 0;
    button1.addEventListener('click', () => {
      const audio = new Audio('static/click.mp3');
      audio.play();
      userInteracted = true;
      rotationAngle1 += 45;
      button1.style.transform = `rotate(${rotationAngle1}deg)`;

      currentDate.setDate(currentDate.getDate() - 1);
      displayServerText(currentDate);
    });

    const button2 = document.getElementById('button2');
    let rotationAngle2 = 0;
    button2.addEventListener('click', () => {
      const audio = new Audio('static/click2.mp3');
      audio.play();
      userInteracted = true;
      rotationAngle2 -= 45;
      button2.style.transform = `rotate(${rotationAngle2}deg)`;

      currentDate.setDate(currentDate.getDate() + 1);
      displayServerText(currentDate);
    });

    // Third button from top: pause / resume BOTH the video and the scrolling text
    // (a plain pause — no direction reversing). Pausing also halts the video<->text loop.
    const button3 = document.getElementById('button3');
    let rotationAngle3 = 0;
    button3.addEventListener('click', () => {
      const audio = new Audio('static/click3.mp3');
      audio.play();
      userInteracted = true;
      rotationAngle3 += 90;
      button3.style.transform = `rotate(${rotationAngle3}deg)`;

      paused = !paused;
      applyPause();
    });

    // Lowest button: toggle between scrolling text and the news-anchor video.
    const button4 = document.getElementById('button4');
    let rotationAngle4 = 0;
    button4.addEventListener('click', () => {
      const audio = new Audio('static/click4.mp3');
      audio.play();
      userInteracted = true;
      paused = false;   // switching modes resumes playback
      rotationAngle4 -= 90;
      button4.style.transform = `rotate(${rotationAngle4}deg)`;

      if (mode === 'text') {
        const url = currentVideoUrl || videoEl.getAttribute('src');
        if (videoAvailable && url) {
          showVideo(url);
        }
        // No video for this day yet -> stay on text (graceful fallback).
      } else {
        revealText();   // explicit request to see the text -> reveal it (with narration)
        showText();
      }
    });

    displayServerText();
  </script>
