  <style>
    .custom-link {
      color: inherit;
      text-decoration: none;
      font-weight: bold;
      font-style: italic;
      font-family: inherit;
    }

    .custom-link:hover {

      text-decoration: underline;
    }

    body {
      background-color: #000000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      margin: 0;
      animation: fadeIn 2s ease-in-out;
      /* Apply fade-in animation */
    }

    #tv {
      background-image: url('static/sandboxtv.webp');
      background-size: cover;
      background-position: center;
      width: 3200px;
      height: 3252px;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    #screen {
      width: 450px;
      height: 331px;
      background-color: rgba(0, 0, 0, 0);
      color: #00ff00;
      font-family: monospace;
      padding: 10px;
      overflow: hidden;
      position: relative;
      margin-top: -12px;
      margin-left: -113px;
      border-radius: 75px;
      overflow-y: scroll;
      box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.7);

      /* Fading edges */
      -webkit-mask-image: radial-gradient(circle, rgba(0, 0, 0, 1) 80%, rgba(0, 0, 0, 0) 100%);
      mask-image: radial-gradient(circle, rgba(0, 0, 0, 1) 80%, rgba(0, 0, 0, 0) 100%);
      -webkit-mask-size: cover;
      mask-size: cover;
      -webkit-mask-composite: destination-in;
      mask-composite: intersect;
    }

    #scrollingText {
      display: inline-block;
      white-space: pre-line;
      /* Start just below the screen and scroll fully past the top at a constant speed.
         The start/end offsets and duration are set per-text in JS (setupScroll) so a long
         decision doesn't begin far off-screen and arrive late. */
      animation: scroll var(--scroll-dur, 30s) linear infinite;
      will-change: transform;
    }

    /* News-anchor video fills the CRT screen; #screen's mask fades its edges too. */
    #tvVideo {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 75px;
      background: #000;

      /* Fade the video's edges into the screen, matching the scrolling text. */
      -webkit-mask-image: radial-gradient(ellipse 80% 80% at center, rgba(0, 0, 0, 1) 55%, rgba(0, 0, 0, 0) 100%);
      mask-image: radial-gradient(ellipse 80% 80% at center, rgba(0, 0, 0, 1) 55%, rgba(0, 0, 0, 0) 100%);
      -webkit-mask-size: cover;
      mask-size: cover;
    }

    #soundHint {
      position: absolute;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      color: #00ff00;
      font-family: monospace;
      font-size: 12px;
      background: rgba(0, 0, 0, 0.55);
      padding: 3px 10px;
      border-radius: 12px;
      pointer-events: none;
      white-space: nowrap;
    }

    #button1 {
      position: absolute;
      width: 140px;
      height: 140px;
      scale: 80%;
      background-color: transparent;
      background-image: url('static/b1.png');
      background-size: cover;
      background-position: center;
      border: none;
      cursor: pointer;
      margin-top: -310px;
      margin-left: 585px;
    }

    #button2 {
      position: absolute;
      width: 120px;
      height: 120px;
      scale: 85%;
      background-color: transparent;
      background-image: url('static/b2.png');
      background-size: cover;
      background-position: center;
      border: none;
      cursor: pointer;
      margin-top: -90px;
      margin-left: 580px;
    }

    #button3 {
      position: absolute;
      width: 125px;
      height: 125px;
      scale: 85%;
      background-color: transparent;
      background-image: url('static/b3.png');
      background-size: cover;
      background-position: center;
      border: none;
      cursor: pointer;
      margin-top: 125px;
      margin-left: 580px;
    }

    #button4 {
      position: absolute;
      width: 125px;
      height: 125px;
      scale: 80%;
      background-color: transparent;
      background-image: url('static/b4.png');
      background-size: cover;
      background-position: center;
      border: none;
      cursor: pointer;
      margin-top: 325px;
      margin-left: 570px;
    }

    @keyframes scroll {
      from {
        transform: translateY(var(--scroll-start, 100%));
      }

      to {
        transform: translateY(var(--scroll-end, -110%));
      }
    }

    @keyframes scrollNone {
      from {
        transform: translateY(45%);
      }

      to {
        transform: translateY(-105%);
      }
    }

    @keyframes scrollRev {
      from {
        transform: translateY(-105%);
      }

      to {
        transform: translateY(45%);
      }
    }

    @keyframes sscroll {
      from {
        transform: translateY(45%);
      }

      to {
        transform: translateY(-105%);
      }
    }

    @keyframes sscrollNone {
      from {
        transform: translateY(45%);
      }

      to {
        transform: translateY(-105%);
      }
    }

    @keyframes sscrollRev {
      from {
        transform: translateY(45%);
      }

      to {
        transform: translateY(-105%);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @media (max-width: 990px) {
      #scrollingText {
        display: inline-block;
        animation: scroll var(--scroll-dur, 30s) linear infinite;
        white-space: pre-line;
      }
    }

    .home-button {
      position: absolute;
      top: 10px;
      left: 10px;
      background-color: #ffffff00;
      color: rgb(0, 0, 0);
      text-decoration: none;
      padding: 8px 15px;
      border-radius: 5px;
      font-size: 16px;
      z-index: 1000;
    }

    .home-button:hover {
      color: rgb(52, 52, 52);
    }

<body>

  <a href="/" class="home-button">H⌂me</a>

  <div id="tv">
    <div id="screen">
      <p id="content"></p>
      <video id="tvVideo" playsinline preload="auto" style="display:none"></video>
      <div id="soundHint" style="display:none">🔊 click for sound</div>
    </div>
    <button id="button1"></button>
    <button id="button2"></button>
    <button id="button3"></button>
    <button id="button4"></button>
  </div>

  <script>
    let currentDate = new Date();

    // ---- text / video mode state ----
    let mode = 'text';            // 'text' | 'video'
    let videoAvailable = false;   // a ready video exists for currentDate
    let userInteracted = false;   // gate unmuted autoplay behind a user gesture
    let paused = false;           // button3: pause BOTH video and scrolling text
    let currentVideoUrl = '';
    let statusPollTimer = null;
    const videoEl = document.getElementById('tvVideo');
    const contentEl = document.getElementById('content');

    function getContent(date = null) {
      const url = date ? `/get-string?date=${date.toISOString()}` : '/get-string';
      return fetch(url)
        .then(response => {
          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }
          return response.text();
        })
        .catch(error => {
          console.error('Error fetching the string:', error);
          return 'Error fetching content';
        });
    }

    function fetchServerText(date = null) {
      return new Promise((resolve) => {
        setTimeout(() => {
          getContent(date).then(commandLineText => resolve(commandLineText));
        }, 1000);
      });
    }

    function sameDay(a, b) {
      return a && b &&
        a.getFullYear() === b.getFullYear() &&
        a.getMonth() === b.getMonth() &&
        a.getDate() === b.getDate();
    }

    function updateSoundHint() {
      const hint = document.getElementById('soundHint');
      if (!hint) return;
      hint.style.display = (mode === 'video' && videoEl.muted && !videoEl.paused) ? 'block' : 'none';
    }

    function showText() {
      mode = 'text';
      try { videoEl.pause(); } catch (e) {}
      videoEl.style.display = 'none';
      contentEl.style.display = 'block';
      const st = document.getElementById('scrollingText');
      if (st) st.style.animationPlayState = paused ? 'paused' : 'running';
      updateSoundHint();
    }

    // Size the scroll to the actual text: start just below the screen, end fully above it,
    // at a constant pixel speed — so long texts don't begin far off-screen and arrive late.
    const SCROLL_SPEED_PX_PER_SEC = 45;
    function setupScroll(el) {
      const screen = document.getElementById('screen');
      const screenH = (screen ? screen.clientHeight : 331);
      const textH = el.scrollHeight || screenH;
      const dur = Math.max(18, (screenH + textH) / SCROLL_SPEED_PX_PER_SEC);
      el.style.setProperty('--scroll-start', screenH + 'px');   // start just below the screen
      el.style.setProperty('--scroll-end', (-textH) + 'px');    // end fully above the screen
      el.style.setProperty('--scroll-dur', dur + 's');
      // Restart the animation cleanly so the new offsets/duration apply from the top.
      el.style.animation = 'none';
      void el.offsetHeight;            // force reflow
      el.style.animation = '';         // fall back to the stylesheet rule (with the vars)
      el.style.animationPlayState = paused ? 'paused' : 'running';
    }

    // Play preferring SOUND. Only fall back to muted if the browser actually blocks
    // unmuted autoplay (NotAllowedError = no user gesture yet) — NOT on transient
    // interruptions (AbortError) caused by restarting/switching, which must not mute us.
    function playPreferSound() {
      videoEl.muted = false;
      const p = videoEl.play();
      if (p && typeof p.catch === 'function') {
        p.catch((err) => {
          if (err && err.name === 'NotAllowedError') {
            videoEl.muted = true;            // autoplay-with-sound blocked -> muted + hint
            videoEl.play().catch(() => {});
          }
          updateSoundHint();
        });
      }
      updateSoundHint();
    }

    function showVideo(url) {
      if (!url) return;
      mode = 'video';
      if (videoEl.getAttribute('src') !== url) videoEl.src = url;
      try { videoEl.currentTime = 0; } catch (e) {}   // restart from the top each time
      videoEl.style.display = 'block';
      contentEl.style.display = 'none';
      if (paused) { videoEl.pause(); updateSoundHint(); return; }
      playPreferSound();
    }

    // Apply the current pause state to whichever mode is showing (button3).
    function applyPause() {
      if (mode === 'video') {
        if (paused) videoEl.pause(); else playPreferSound();
      } else {
        const st = document.getElementById('scrollingText');
        if (st) st.style.animationPlayState = paused ? 'paused' : 'running';
      }
      updateSoundHint();
    }

    // EVERY click is a user gesture: unlock sound on the playing video (works repeatedly,
    // so a muted auto-start can always be turned on by clicking anywhere).
    document.addEventListener('click', () => {
      userInteracted = true;
      if (mode === 'video' && !paused && videoEl.muted) {
        videoEl.muted = false;
        videoEl.play().catch(() => {});
        updateSoundHint();
      }
    }, true);
    videoEl.addEventListener('playing', updateSoundHint);
    // If the proxied MP4 can't load, fall back to scrolling text instead of a black screen.
    videoEl.addEventListener('error', () => {
      console.error('TV video failed to load:', videoEl.error);
      videoAvailable = false;
      showText();
    });

    // ---- video <-> text loop ----
    // When the video ends, switch to scrolling text; after one full text scroll cycle,
    // switch back to the video. Repeats. (No-ops while paused or when no video exists.)
    videoEl.addEventListener('ended', () => {
      if (!paused && videoAvailable) showText();
    });
    document.addEventListener('animationiteration', (e) => {
      if (e.target && e.target.id === 'scrollingText'
          && mode === 'text' && !paused && videoAvailable && currentVideoUrl) {
        showVideo(currentVideoUrl);
      }
    });

    async function fetchVideoStatus(date) {
      try {
        const url = `/genbox-video-status?date=${(date || new Date()).toISOString()}`;
        const r = await fetch(url);
        if (!r.ok) return { status: 'absent', video_url: '' };
        return await r.json();
      } catch (e) {
        return { status: 'absent', video_url: '' };
      }
    }

    // Poll the status endpoint; the first poll lazily starts background generation.
    function startStatusPolling(date) {
      clearInterval(statusPollTimer);
      videoAvailable = false;
      currentVideoUrl = '';
      const pollDate = date ? new Date(date) : new Date();
      const poll = async () => {
        const s = await fetchVideoStatus(pollDate);
        if (s.status === 'ready' && s.video_url) {
          clearInterval(statusPollTimer);
          videoAvailable = true;
          // Play via the same-origin proxy so it works even if the blob container is private.
          currentVideoUrl = `/genbox-video?date=${pollDate.toISOString()}`;
          // Auto-switch to video (the default mode) once it's ready, for the current day.
          // If the user hasn't clicked yet it plays muted with a "click for sound" hint.
          if (sameDay(pollDate, currentDate)) {
            showVideo(currentVideoUrl);
          }
        } else if (s.status === 'generating') {
          // keep polling
        } else {
          // absent | disabled | failed -> no video for this day
          clearInterval(statusPollTimer);
          videoAvailable = false;
        }
      };
      poll();
      statusPollTimer = setInterval(poll, 4000);
    }

    async function displayServerText(date = null) {
      // Each day (re)load starts on text, unpaused; video is offered/auto-switched when ready.
      paused = false;
      showText();
      const contentDiv = document.getElementById('content');
      let scrollingText = document.getElementById('scrollingText');

      if (!scrollingText) {
        // Create #scrollingText only if it doesn't exist
        scrollingText = document.createElement('div');
        scrollingText.id = 'scrollingText';
        contentDiv.appendChild(scrollingText);
      }

      const serverText = await fetchServerText(date);
      scrollingText.innerHTML = serverText + '\n<a href="https://medium.com/@abozar-alizadeh/exploring-ai-driven-governance-building-a-virtual-world-where-ai-rules-22419690a409" target="_blank" class="custom-link">Discover More!</a>'; // Only update the text content
      setupScroll(scrollingText);   // size the scroll to this text's length

      startStatusPolling(date);
    }

    const button1 = document.getElementById('button1');
    let rotationAngle1 = 0;
    button1.addEventListener('click', () => {
      const audio = new Audio('static/click.mp3');
      audio.play();
      userInteracted = true;
      rotationAngle1 += 45;
      button1.style.transform = `rotate(${rotationAngle1}deg)`;

      currentDate.setDate(currentDate.getDate() - 1);
      displayServerText(currentDate);
    });

    const button2 = document.getElementById('button2');
    let rotationAngle2 = 0;
    button2.addEventListener('click', () => {
      const audio = new Audio('static/click2.mp3');
      audio.play();
      userInteracted = true;
      rotationAngle2 -= 45;
      button2.style.transform = `rotate(${rotationAngle2}deg)`;

      currentDate.setDate(currentDate.getDate() + 1);
      displayServerText(currentDate);
    });

    // Third button from top: pause / resume BOTH the video and the scrolling text
    // (a plain pause — no direction reversing). Pausing also halts the video<->text loop.
    const button3 = document.getElementById('button3');
    let rotationAngle3 = 0;
    button3.addEventListener('click', () => {
      const audio = new Audio('static/click3.mp3');
      audio.play();
      userInteracted = true;
      rotationAngle3 += 90;
      button3.style.transform = `rotate(${rotationAngle3}deg)`;

      paused = !paused;
      applyPause();
    });

    // Lowest button: toggle between scrolling text and the news-anchor video.
    const button4 = document.getElementById('button4');
    let rotationAngle4 = 0;
    button4.addEventListener('click', () => {
      const audio = new Audio('static/click4.mp3');
      audio.play();
      userInteracted = true;
      paused = false;   // switching modes resumes playback
      rotationAngle4 -= 90;
      button4.style.transform = `rotate(${rotationAngle4}deg)`;

      if (mode === 'text') {
        const url = currentVideoUrl || videoEl.getAttribute('src');
        if (videoAvailable && url) {
          showVideo(url);
        }
        // No video for this day yet -> stay on text (graceful fallback).
      } else {
        showText();
      }
    });

    displayServerText();
  </script>

</body>
